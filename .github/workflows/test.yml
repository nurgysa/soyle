name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-unit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: irm https://astral.sh/uv/install.ps1 | iex
        shell: pwsh

      - name: Install deps
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src/

      - name: Pytest (unit only — integration skipped without GPU)
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Security audit — pip-audit
        # pip-audit queries the PyPA advisory DB for known CVEs in installed
        # deps. `uvx` runs the tool in an ephemeral venv so it doesn't pollute
        # the project environment.
        run: uv pip freeze | uvx pip-audit --requirement /dev/stdin
        shell: bash
