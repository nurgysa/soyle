name: release

# Triggered by pushing a tag like `v1.0.1`. Builds the Windows installer
# with PyInstaller + Inno Setup on a clean runner and uploads the .exe to
# the matching GitHub Release. Non-technical end users download that
# single file from github.com/<repo>/releases/latest — no git, no uv, no
# command line.
#
# Code signing: when SignPath Foundation (free for open-source) is wired
# up (see docs/signing.md), the sign-and-publish job submits the built
# installer for Authenticode signing and attaches the SIGNED .exe to the
# release. The job is gated on the SIGNING_ENABLED repo variable; when it
# is not set (or the SignPath secrets are missing), the workflow still
# publishes the UNSIGNED installer so releases never break.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # manual re-run from the Actions tab if a build fails

permissions:
  contents: write  # needed by softprops/action-gh-release to attach assets

jobs:
  build-installer:
    runs-on: windows-latest
    timeout-minutes: 30

    outputs:
      artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        run: irm https://astral.sh/uv/install.ps1 | iex
        shell: pwsh

      - name: Install Inno Setup 6
        # Chocolatey is pre-installed on windows-latest runners and lands
        # iscc.exe at "C:\Program Files (x86)\Inno Setup 6\iscc.exe" —
        # which is one of the paths that build_installer.py already
        # auto-detects, so no env var plumbing needed.
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Sync build deps
        # --extra build pulls pyinstaller + pillow. We deliberately skip
        # --extra gpu so the bundle stays CPU-only (~300 MB). End users
        # with a CUDA GPU get acceleration via their NVIDIA driver at
        # runtime; transcriber.py falls back to CPU if it's missing.
        run: uv sync --extra build
        shell: pwsh

      - name: Verify version matches tag
        # Catches the classic mistake of tagging v1.0.1 without bumping
        # pyproject.toml — would otherwise ship an installer named
        # Soyle-Setup-1.0.0.exe for a v1.0.1 release.
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $pyproject = uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])"
          if ($tag -ne $pyproject.Trim()) {
            Write-Error "Tag $tag does not match pyproject.toml version $pyproject"
            exit 1
          }

      - name: Build installer
        run: uv run python scripts/build_installer.py
        shell: pwsh

      - name: Show artifact
        shell: pwsh
        run: Get-ChildItem release\

      - name: Upload unsigned installer as build artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: installer-unsigned
          path: release/Soyle-Setup-*.exe
          if-no-files-found: error
          retention-days: 14

  sign-and-publish:
    needs: build-installer
    if: ${{ vars.SIGNING_ENABLED == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write   # required by SignPath OIDC workflow identity check
      actions: read

    steps:
      - name: Submit to SignPath for Authenticode signing
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token:              ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id:        ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug:           ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug:    ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id:     ${{ needs.build-installer.outputs.artifact-id }}
          wait-for-completion:    true
          output-artifact-directory: release-signed

      - name: Attach signed installer to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-signed/Soyle-Setup-*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false

  publish-unsigned:
    needs: build-installer
    if: ${{ vars.SIGNING_ENABLED != 'true' }}
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Download unsigned installer
        uses: actions/download-artifact@v4
        with:
          name: installer-unsigned
          path: release

      - name: Attach unsigned installer to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/Soyle-Setup-*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
