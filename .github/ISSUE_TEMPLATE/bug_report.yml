name: Bug report
description: Report a problem with Söyle (crash, wrong text, UI glitch)
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Fill in as much as you can — logs live at
        `%LOCALAPPDATA%/Soyle/logs` if you need them.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we trigger it? (e.g. hold Right Alt, speak KZ+RU, release)
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: dropdown
    id: lang
    attributes:
      label: Whisper language setting
      options:
        - Auto
        - Қазақша
        - Русский
        - English
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log snippet (optional)
      render: shell
    validations:
      required: false
